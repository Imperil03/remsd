<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <link rel="stylesheet" href="{{rootPath}}assets/css/styles.css?v={{assetVersion}}">
  </head>
  <body>
    {{header}}

    <main>
      <section class="page-hero">
        <div class="container page-hero__inner">
          <nav class="breadcrumbs" aria-label="Хлебные крошки">
            <a href="{{rootPath}}">Главная</a>
            <span>/</span>
            <a href="{{rootPath}}{{breadcrumbHref}}">{{breadcrumbLabel}}</a>
          </nav>
          <p class="eyebrow">{{kicker}}</p>
          <h1>{{h1}}</h1>
          <p class="page-hero__lead">{{lead}}</p>
          <div class="page-hero__actions" aria-label="Основные действия">
            <a class="button button--primary" href="tel:+73462260504">Позвонить мастеру</a>
            <a class="button button--secondary" href="{{rootPath}}kontakty/">Контакты сервиса</a>
          </div>
        </div>
      </section>

      <section class="service-detail" aria-labelledby="service-detail-title">
        <div class="container service-detail__inner">
          <div class="service-layout">
            <article class="detail-block">
              <h2 id="service-detail-title">{{worksTitle}}</h2>
              <ul class="check-list">
{{works}}
              </ul>
            </article>

            <aside class="detail-block detail-block--accent">
              <h2>{{techTitle}}</h2>
              <p>{{techText}}</p>
              <div class="brand-line" aria-label="Марки и типы техники">
{{brands}}
              </div>
            </aside>
          </div>

          <div class="detail-block">
            <h2>{{processTitle}}</h2>
            <ul class="check-list">
{{process}}
            </ul>
          </div>

          <div class="page-cta">
            <div>
              <h2>{{ctaTitle}}</h2>
              <p>{{ctaText}}</p>
            </div>
            <a class="button button--primary" href="tel:+73462260504">Позвонить</a>
          </div>

          <div class="related-links" aria-label="Связанные услуги">
{{related}}
          </div>
        </div>
      </section>
    </main>

    {{footer}}
    {{mobile-callbar}}

    <script src="{{rootPath}}assets/js/main.js?v={{assetVersion}}"></script>
  </body>
</html>
